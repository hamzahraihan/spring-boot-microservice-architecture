services:
  mongodb:
    image: mongo:8.3.2
    container_name: mongodb
    ports:
      - 27017:27017
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: root
      MONGO_INITDB_DATABASE: product-service
    volumes:
      - mongo_data:/data/db
volumes:
  mongo_data:
