services:
  mysql:
    image: mysql:8.4.9
    container_name: order-service-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
    ports:
      - 3316:3306
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  mysql_data:
